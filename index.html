<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAP Sequence Explorer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Force Graph 2D -->
    <script src="https://unpkg.com/react-force-graph-2d"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #03050a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .bg-mystic {
            background: radial-gradient(circle at 50% 0%, rgba(30, 10, 60, 0.4) 0%, rgba(3, 5, 10, 1) 70%);
        }

        .text-glow {
            background: linear-gradient(135deg, #00f2fe 0%, #8a2be2 50%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 25px rgba(138, 43, 226, 0.4);
        }

        .glass-card {
            background: rgba(16, 22, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(138, 43, 226, 0.15);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .glass-card:hover { border: 1px solid rgba(0, 242, 254, 0.3); box-shadow: 0 8px 40px rgba(0, 242, 254, 0.1); }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0e17; }
        ::-webkit-scrollbar-thumb { background: #2a324b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4facfe; }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .heat-cell {
            transition: all 0.2s;
        }
        .heat-cell:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        .motif-pill {
            cursor: pointer;
            transition: all 0.2s;
        }
        .motif-pill:hover {
            background: rgba(0, 242, 254, 0.2);
            border-color: #00f2fe;
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }
        .motif-pill.active {
            background: rgba(0, 242, 254, 0.8);
            color: #000;
            font-weight: 800;
        }
    </style>
</head>
<body class="bg-mystic min-h-screen">
    <div id="root"></div>

    <!-- Inject static data bundle for fully portable web deployment on GitHub Pages -->
    <script src="data.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;



        const ForceGraph2D = window.ForceGraph2D || window.ReactForceGraph2d;

        const NetworkChart = ({ data, onClose, onNodeClick }) => {
            const [dimensions, setDimensions] = useState({ 
                width: Math.min(window.innerWidth * 0.9, 1400), 
                height: Math.min(window.innerHeight * 0.9, 900) 
            });
            const [minStrength, setMinStrength] = useState(10);
            const fgRef = useRef();
            
            useEffect(() => {
                const handleResize = () => {
                    setDimensions({ 
                        width: Math.min(window.innerWidth * 0.9, 1400), 
                        height: Math.min(window.innerHeight * 0.9, 900) 
                    });
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Increase physics repulsion to untangle the hairball
            useEffect(() => {
                if (fgRef.current) {
                    fgRef.current.d3Force('charge').strength(-800); // Push nodes apart
                    fgRef.current.d3Force('link').distance(100); // Increase string length
                }
            }, []);

            // Filter data to only show highly co-occurring motifs (value > minStrength) to reduce noise
            const filteredData = useMemo(() => {
                const filteredLinks = data.links.filter(l => l.value >= minStrength);
                
                // Only keep nodes that have at least one valid link after filtering
                const validNodes = new Set();
                filteredLinks.forEach(l => {
                    validNodes.add(l.source);
                    validNodes.add(l.target);
                });
                
                return {
                    nodes: data.nodes.filter(n => validNodes.has(n.id)),
                    links: filteredLinks
                };
            }, [data, minStrength]);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md fade-in">
                    <button 
                        onClick={onClose}
                        className="absolute top-6 right-8 text-white hover:text-[#00f2fe] flex items-center gap-2 font-bold tracking-widest uppercase transition-colors text-xs border border-gray-600 rounded px-4 py-2 hover:border-[#00f2fe] bg-black/80 z-[60]"
                    >
                        ✖ CLOSE NETWORK
                    </button>

                    <div className="relative border border-gray-800 rounded-xl bg-black/40 shadow-2xl overflow-hidden" style={{ width: dimensions.width, height: dimensions.height }}>
                        
                        {/* Control Panel Anchored strictly within the graph box */}
                        <div className="absolute top-6 left-6 pointer-events-auto z-[60] bg-black/80 p-5 border border-gray-700 rounded-xl backdrop-blur-md shadow-[0_0_30px_rgba(0,0,0,0.8)] min-w-[320px] max-w-[400px]">
                            <h2 className="text-xl font-extrabold text-glow tracking-widest leading-none mb-1">CONSTELLATION</h2>
                            <p className="text-gray-400 text-xs mb-6 leading-tight">Physics-driven telemetry mapping of overlapping anomalies.</p>
                            
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-bold text-[#00f2fe] uppercase tracking-widest flex justify-between">
                                    <span>Signal Filter</span>
                                    <span>{minStrength}+ Hits</span>
                                </label>
                                <input 
                                    type="range" 
                                    min="1" 
                                    max="50" 
                                    value={minStrength} 
                                    onChange={(e) => setMinStrength(parseInt(e.target.value))}
                                    className="w-full h-2 rounded-lg appearance-none cursor-pointer bg-gray-800 accent-[#00f2fe]"
                                />
                                <p className="text-[10px] text-gray-500 leading-tight mt-1">
                                    Slide right to filter out rare anomalies, revealing the core structural "spine" of the UFO Matrix.
                                </p>
                            </div>
                        </div>

                        <ForceGraph2D
                            ref={fgRef}
                            graphData={filteredData}
                            width={dimensions.width}
                            height={dimensions.height}
                            nodeLabel="name"
                            nodeColor={node => {
                                // Group color logic
                                const colors = {
                                    "THE UFO": "#00f2fe", // Cyan
                                    "THE BEINGS": "#39ff14", // Neon Green
                                    "EXAmINATION": "#ffff00", // Yellow
                                    "COmmUNICATION": "#ffaa00", // Orange
                                    "mESSASES": "#8a2be2", // Purple
                                    "THE OTHERWORLD": "#ff00ff", // Magenta
                                    "EFFECTS": "#ff007f", // Pink
                                    "THEOPHANY": "#ffa500", // Gold
                                    "SOUVENIR": "#00ffcc", // Aquamarine
                                    "AFTEREFFECTS": "#ff4500", // Red-Orange
                                };
                                return colors[node.group] || "#ffffff";
                            }}
                            nodeRelSize={6}
                            linkColor={link => `rgba(0, 242, 254, ${Math.min(0.8, link.value / 20)})`}
                            linkWidth={link => Math.log(link.value) * 1.5}
                            backgroundColor="transparent"
                            enableNodeDrag={true}
                            enableZoomPanInteraction={true}
                            onNodeClick={(node) => {
                                if (onNodeClick) {
                                    onNodeClick(node.id);
                                }
                            }}
                        />
                        
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [stats, setStats] = useState({ total_encounters: 0, total_events: 0 });
            const [architecture, setArchitecture] = useState([]);
            const [cases, setCases] = useState([]);
            const [heatmap, setHeatmap] = useState([]);
            const [motifDict, setMotifDict] = useState([]);
            
            const [selectedCase, setSelectedCase] = useState(null);
            const [sequence, setSequence] = useState([]);
            const [loading, setLoading] = useState(true);

            // Filters
            const [filterMulti, setFilterMulti] = useState(false);
            const [filterMotifCat, setFilterMotifCat] = useState("ALL");
            const [filterMotifCodes, setFilterMotifCodes] = useState([]);
            const [filterHypnosis, setFilterHypnosis] = useState(false);
            const [filterSource, setFilterSource] = useState("ALL");
            const [searchQuery, setSearchQuery] = useState("");
            const [expandedCategory, setExpandedCategory] = useState(null);
            const [showNetworkModal, setShowNetworkModal] = useState(false);

            useEffect(() => {
                const loadData = () => {
                    if (typeof UAP_DATA === 'undefined') {
                        console.error("Data bundle not found. Please ensure data.js is generated.");
                        return;
                    }
                    setStats(UAP_DATA.stats);
                    setArchitecture(UAP_DATA.architecture);
                    setCases(UAP_DATA.cases);
                    setHeatmap(UAP_DATA.heatmap);
                    setMotifDict(UAP_DATA.motifs);
                    setLoading(false);
                };
                
                // Slight delay to allow DOM to catch up for aesthetic loading
                setTimeout(loadData, 800);
            }, []);

            const loadSequence = (encounter_id) => {
                const data = UAP_DATA.sequences[encounter_id] || [];
                setSequence(data);
                setSelectedCase(cases.find(c => c.Encounter_ID === encounter_id));
            };

            const formatCategory = (cat) => cat.split('--')[1].replace('.', '').trim();

            const uniqueCategories = useMemo(() => {
                return ["ALL", ...Array.from(new Set(architecture.map(a => a.full_category)))];
            }, [architecture]);

            const filteredCases = useMemo(() => {
                return cases.filter(c => {
                    if (filterMulti && c.num_subjects < 2) return false;
                    if (filterHypnosis && c.hypnosis !== 1) return false;
                    if (filterSource !== "ALL" && c.source !== filterSource) return false;
                    if (filterMotifCat !== "ALL" && (!c.motifs_present || !c.motifs_present.includes(filterMotifCat))) return false;
                    
                    if (filterMotifCodes.length > 0) {
                        // "OR" logic: Show case if it has AT LEAST ONE of the selected motif codes
                        const hasSelectedMotif = filterMotifCodes.some(code => c.motifs_present_codes?.includes(code));
                        if (!hasSelectedMotif) return false;
                    }
                    
                    return true;
                });
            }, [cases, filterMulti, filterMotifCat, filterMotifCodes, filterHypnosis, filterSource]);

            const heatmapGrouped = useMemo(() => {
                const grouped = {};
                heatmap.forEach(h => {
                    if (!grouped[h.decade]) grouped[h.decade] = [];
                    grouped[h.decade].push(h);
                });
                return Object.keys(grouped).sort().map(dec => ({
                    decade: dec,
                    data: grouped[dec].sort((a,b) => b.count - a.count)
                }));
            }, [heatmap]);

            // Dictionary Search & Grouping
            const filteredGroupedDictionary = useMemo(() => {
                const query = searchQuery.toLowerCase();
                const grouped = {};
                motifDict.forEach(m => {
                    if (query && !m.motif_number.toLowerCase().includes(query) && !m.motif_description.toLowerCase().includes(query)) {
                        return; // Skip if doesn't match search
                    }
                    const cat = m.current_family_header ? formatCategory(m.current_family_header) : "UNKNOWN CATEGORY";
                    if (!grouped[cat]) grouped[cat] = [];
                    grouped[cat].push(m);
                });
                return Object.keys(grouped).sort().map(cat => ({
                    category: cat,
                    motifs: grouped[cat].sort((a,b) => a.motif_number.localeCompare(b.motif_number))
                }));
            }, [motifDict, searchQuery]);



            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="animate-pulse text-[#00d2ff] text-2xl font-bold tracking-widest text-glow">
                            CALIBRATING UAP MATRIX...
                        </div>
                    </div>
                );
            }

            return (
                <div className="container mx-auto px-6 py-12 max-w-[1400px] fade-in">
                    
                    <div className="mb-12 border-b border-gray-800 pb-6">
                        <div className="flex justify-between items-end mb-6">
                            <div className="flex-1">
                                <h1 className="text-5xl font-extrabold text-glow tracking-tight mb-2">UAP Sequence Explorer</h1>
                                <p className="text-[#a0aec0] text-lg font-light tracking-wide uppercase flex items-center gap-2">
                                    Mapping the Patterns of Anomalous Encounters
                                </p>
                            </div>
                            <div className="text-right">
                                <div className="text-sm text-gray-400 font-mono">DATABASE_STATUS: ONLINE</div>
                                <div className="text-xs text-[#00f2fe] uppercase mt-1">Loaded {stats.total_encounters} Global Records</div>
                            </div>
                        </div>

                        <div className="bg-black/40 border border-gray-800 rounded-lg p-6">
                            <p className="text-white mb-4 leading-relaxed">
                                <strong className="text-[#00f2fe]">Welcome to the UAP Matrix.</strong><br/>
                                Are experiencers reporting the exact same sequence of events across decades? To find out, this interactive database maps the core structure of {stats.total_encounters} historical anomalous encounters.
                            </p>
                            <h3 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">How to use this tool:</h3>
                            <ul className="list-disc list-inside text-gray-300 space-y-2 mb-6">
                                <li><strong className="text-white">Filter the Matrix:</strong> Use the Global Filters below to zero in on specific types of encounters (e.g., cases involving multiple witnesses).</li>
                                <li><strong className="text-white">Explore Case Timelines:</strong> Select a case from the Explorer grid to see its full chronological sequence of events.</li>
                                <li><strong className="text-white">Discover Patterns:</strong> Scroll to the bottom to view the Relational Analytics engine, which visualizes decades of recurring anomalies.</li>
                            </ul>
                            
                            <details className="cursor-pointer group outline-none">
                                <summary className="text-xs font-bold text-[#8a2be2] hover:text-[#d4b3ff] uppercase tracking-widest flex items-center gap-2 outline-none">
                                    <span>🔬 The Framework I'm Using</span>
                                </summary>
                                <div className="mt-4 p-4 bg-[#10162a] rounded border border-gray-700 text-sm text-gray-400 leading-relaxed cursor-default">
                                    This database is built on the motif taxonomy created by folklorist <strong>Dr. Thomas E. Bullard</strong>. I am using a custom AI pipeline to analyze and map modern anomalous accounts, starting with the psychiatric casework of <strong>Dr. John E. Mack</strong>.
                                </div>
                            </details>
                        </div>
                    </div>

                    {/* NEW FILTERS ENGINE */}
                    <div className="glass-card p-6 mb-12 flex flex-wrap gap-4 items-center">
                        <div className="font-bold text-gray-300 w-full mb-2 uppercase tracking-widest text-sm border-b border-gray-800 pb-2 flex justify-between items-center">
                            <span>Global Matrix Filters</span>
                            {filterMotifCodes.length > 0 && (
                                <span className="text-[#00f2fe] text-xs px-2 py-0.5 border border-[#00f2fe]/30 rounded cursor-pointer hover:bg-[#00f2fe]/20" onClick={() => setFilterMotifCodes([])}>
                                    Clear Exact Code Slicer ({filterMotifCodes.length}) ✖
                                </span>
                            )}
                        </div>

                        <button 
                            onClick={() => setFilterMulti(!filterMulti)}
                            className={`px-4 py-2 rounded-full text-sm font-bold border transition-colors ${filterMulti ? 'bg-[#8a2be2] text-white border-[#8a2be2] shadow-[0_0_15px_rgba(138,43,226,0.5)]' : 'bg-transparent text-gray-400 border-gray-700 hover:border-gray-400'}`}
                        >
                            👨‍👩‍👧‍👦 Multiple Experiencers
                        </button>
                        
                        <button 
                            onClick={() => setFilterHypnosis(!filterHypnosis)}
                            className={`px-4 py-2 rounded-full text-sm font-bold border transition-colors ${filterHypnosis ? 'bg-[#00f2fe] text-gray-900 border-[#00f2fe] shadow-[0_0_15px_rgba(0,242,254,0.5)]' : 'bg-transparent text-gray-400 border-gray-700 hover:border-gray-400'}`}
                        >
                            🌀 Memory Recovery (Hypnosis)
                        </button>

                        <div className="flex items-center border border-gray-700 rounded-full px-4 py-2 bg-black/30">
                            <span className="text-sm font-bold text-gray-400 mr-2">Data Source:</span>
                            <select 
                                className="bg-transparent text-[#39ff14] outline-none text-sm cursor-pointer appearance-none font-bold min-w-[120px]"
                                value={filterSource}
                                onChange={(e) => setFilterSource(e.target.value)}
                            >
                                <option value="ALL" className="bg-gray-900">All Sources</option>
                                <option value="Bullard" className="bg-gray-900">Bullard Archive</option>
                                <option value="Mack" className="bg-gray-900">John Mack Casework</option>
                            </select>
                        </div>

                        <div className="flex items-center border border-gray-700 rounded-full px-4 py-2 bg-black/30">
                            <span className="text-sm font-bold text-gray-400 mr-2">Core Category Contains:</span>
                            <select 
                                className="bg-transparent text-white outline-none text-sm cursor-pointer appearance-none min-w-[150px]"
                                value={filterMotifCat}
                                onChange={(e) => setFilterMotifCat(e.target.value)}
                            >
                                {uniqueCategories.map(c => (
                                    <option key={c} value={c} className="bg-gray-900">{c === "ALL" ? "Show Everything" : formatCategory(c)}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    {/* EXPLORER GRID */}
                    <div className="mb-16">
                        <div className="flex justify-between items-center border-b border-gray-800 pb-4 mb-8">
                            <h2 className="text-2xl font-bold text-white">Case File Explorer</h2>
                            <div className="text-sm font-bold text-[#4facfe]">{filteredCases.length} Matching Cases</div>
                        </div>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            
                            {/* MOTIF CLICK-THROUGH DICTIONARY */}
                            <div className="glass-card p-4 h-[750px] flex flex-col">
                                <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                                    <h3 className="text-sm font-bold text-gray-300 uppercase tracking-widest">Motif Dictionary</h3>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => setShowNetworkModal(true)}
                                            className="text-[10px] font-bold px-2 py-1 flex items-center gap-1 rounded border border-[#00f2fe]/50 text-[#00f2fe] hover:bg-[#00f2fe]/20 hover:text-white transition-all"
                                        >
                                            🕸️ Constellation Graph
                                        </button>
                                    </div>
                                </div>
                                <input 
                                    type="text"
                                    placeholder="Search codes (e.g. M119)..."
                                    className="w-full bg-black/50 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white mb-4 outline-none focus:border-[#00f2fe]"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                                <div className="flex-1 overflow-y-auto pr-2 space-y-2 custom-scroll">
                                    {filteredGroupedDictionary.map((group, idx) => {
                                        const isExpanded = expandedCategory === group.category || (searchQuery !== "" && group.motifs.length > 0);
                                        return (
                                            <div key={idx} className="bg-black/40 border border-gray-800 rounded-lg overflow-hidden transition-all">
                                                <div 
                                                    className={`p-3 flex justify-between items-center cursor-pointer transition-colors ${isExpanded ? 'bg-[#8a2be2]/20 border-b border-[#8a2be2]/30 text-[#d4b3ff]' : 'hover:bg-gray-800/50 text-gray-300'}`}
                                                    onClick={() => setExpandedCategory(isExpanded ? null : group.category)}
                                                >
                                                    <span className="font-extrabold uppercase text-[11px] tracking-widest truncate pr-2">{group.category}</span>
                                                    <span className="text-[10px] text-gray-500">{isExpanded ? '▼' : '▶'}</span>
                                                </div>
                                                {isExpanded && (
                                                    <div className="p-2 space-y-1 bg-[#0a0e17]">
                                                        {group.motifs.map(m => {
                                                            const isSelected = filterMotifCodes.includes(m.motif_number);
                                                            return (
                                                                <div 
                                                                    key={m.motif_number}
                                                                    onClick={() => {
                                                                        setFilterMotifCodes(prev => 
                                                                            prev.includes(m.motif_number) 
                                                                                ? prev.filter(code => code !== m.motif_number)
                                                                                : [...prev, m.motif_number]
                                                                        );
                                                                    }}
                                                                    className={`p-2 rounded border cursor-pointer transition-all ${isSelected ? 'bg-[#00f2fe]/20 border-[#00f2fe] text-[#00f2fe]' : 'bg-black border-gray-800 text-gray-400 hover:border-gray-500 hover:text-gray-200'}`}
                                                                >
                                                                    <div className="font-mono text-[10px] font-bold mb-1">{m.motif_number}</div>
                                                                    <div className="text-[10px] leading-tight line-clamp-2">{m.motif_description}</div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                    {filteredGroupedDictionary.length === 0 && <div className="text-xs text-center text-gray-500 p-2">No motifs found.</div>}
                                </div>
                            </div>

                            {/* CASE LIST */}
                            <div className="glass-card p-4 h-[750px] overflow-y-auto">
                                <h3 className="text-sm font-bold text-gray-300 uppercase tracking-widest mb-4 border-b border-gray-800 pb-2">Filtered Cases</h3>
                                {filteredCases.map(c => (
                                    <div 
                                        key={c.Encounter_ID} 
                                        onClick={() => loadSequence(c.Encounter_ID)}
                                        className={`p-4 mb-3 rounded-lg cursor-pointer transition-all ${selectedCase?.Encounter_ID === c.Encounter_ID ? 'bg-[#1a233a] border-l-4 border-[#00f2fe]' : 'hover:bg-[#10162a]'}`}
                                    >
                                        <div className="flex justify-between items-start">
                                            <h4 className="font-bold text-white text-lg">Case {c.case_num}</h4>
                                            {c.num_subjects > 1 && (
                                                <span className="bg-[#8a2be2]/30 text-[#e2e8f0] text-[10px] px-2 py-1 rounded border border-[#8a2be2] flex gap-1 items-center" title="Multiple Experiencers">
                                                    👨‍👩‍👧‍👦 x{c.num_subjects}
                                                </span>
                                            )}
                                        </div>
                                        <div className="text-xs text-gray-400 mt-2 flex justify-between items-center">
                                            <span className="truncate pr-2">{c.subject}</span>
                                            <span className="whitespace-nowrap bg-black text-gray-500 px-2 py-0.5 rounded">{c.date !== 'nan' ? c.date : 'Unknown'}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* SEQUENCE VIEWER */}
                            <div className="lg:col-span-2 glass-card p-8 h-[750px] flex flex-col relative">
                                {!selectedCase ? (
                                    <div className="h-full flex items-center justify-center text-center p-12 text-gray-500 border border-gray-800/50 rounded-xl bg-black/40">
                                        <div>
                                            <div className="text-4xl mb-4 opacity-50">📂</div>
                                            <h3 className="text-xl font-bold text-gray-400 mb-2">No Case Selected</h3>
                                            <p className="max-w-md mx-auto">
                                                Select a case file from the left to view its timeline, or click a specific motif code from the dictionary below to filter the global matrix.
                                            </p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 flex flex-col h-full fade-in">
                                        <div className="mb-6 flex justify-between items-start border-b border-gray-800 pb-4">
                                            <div>
                                                <h3 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 mb-2">Case {selectedCase.case_num}</h3>
                                                <p className="text-[#a0aec0] text-sm uppercase tracking-wider">{selectedCase.subject} • {selectedCase.location} • {selectedCase.date === 'nan' ? 'Unknown Date' : selectedCase.date}</p>
                                            </div>
                                            <span className={`px-4 py-2 rounded-full text-xs font-bold shadow-lg ${selectedCase.hypnosis ? 'bg-purple-900/60 text-purple-200 border border-purple-500' : 'bg-[#0a0e17] text-gray-300 border border-gray-700'}`}>
                                                {selectedCase.hypnosis ? '🌀 Hypnosis Utilized' : '👁️ Conscious Recall'}
                                            </span>
                                        </div>

                                        <div className="flex-1 overflow-y-auto pr-4 space-y-8 pb-10 custom-scroll">
                                            {sequence.map((event, i) => (
                                                <div key={i} className="flex gap-6 group">
                                                    <div className="flex flex-col items-center">
                                                        <div className="w-10 h-10 rounded-full bg-[#10162a] border-2 border-[#00f2fe] shadow-[0_0_10px_rgba(0,242,254,0.3)] flex items-center justify-center text-sm font-bold text-white z-10 transition-transform group-hover:scale-110 group-hover:bg-[#00f2fe] group-hover:text-black">
                                                            {event.seq}
                                                        </div>
                                                        {i !== sequence.length - 1 && <div className="w-0.5 h-full bg-gradient-to-b from-[#00f2fe] to-transparent my-2 opacity-30"></div>}
                                                    </div>
                                                    
                                                    <div className="flex-1 pb-2">
                                                        <div className="flex justify-between items-center mb-3">
                                                            <div className="flex items-center gap-3">
                                                                <span 
                                                                    onClick={() => {
                                                                        setFilterMotifCodes(prev => 
                                                                            prev.includes(event.code) 
                                                                                ? prev.filter(c => c !== event.code)
                                                                                : [...prev, event.code]
                                                                        );
                                                                    }} 
                                                                    className={`px-2 py-1 border rounded text-xs font-mono tracking-wider shadow-inner motif-pill ${filterMotifCodes.includes(event.code) ? 'active bg-[#00f2fe] text-black border-[#00f2fe]' : 'bg-black/60 border-gray-700 text-[#00f2fe]'}`}
                                                                    title="Click to toggle filtering by this Motif Code"
                                                                >
                                                                    {event.code}
                                                                </span>
                                                                <span className="font-extrabold text-gray-300 tracking-wide uppercase text-sm">{formatCategory(event.category)}</span>
                                                            </div>
                                                            <span className={`text-[10px] uppercase font-bold tracking-widest px-3 py-1 rounded-full ${event.memory === 'hypnosis' ? 'bg-[#8a2be2]/30 text-[#d4b3ff] border border-[#8a2be2]/50' : event.memory === 'conscious' ? 'bg-[#00f2fe]/20 text-[#00f2fe] border border-[#00f2fe]/50' : 'bg-gray-800 text-gray-500'}`}>
                                                                {event.memory}
                                                            </span>
                                                        </div>
                                                        <p className="text-white text-base font-light mb-3 leading-relaxed">{event.description}</p>
                                                        <div className="p-4 bg-black/40 rounded-lg border-l-4 border-l-[#8a2be2] text-sm text-[#a0aec0] italic shadow-inner">
                                                            "{event.citation}"
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* HEATMAP GRAPHIC */}
                    <div className="glass-card mb-12 p-8">
                        <h2 className="text-2xl font-bold text-white mb-2 flex items-center gap-3">
                            Chronological Motif Heatmap
                        </h2>
                        <p className="text-gray-400 text-sm mb-6">Visualizing how encounter architecture shifts across decades.</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                            {heatmapGrouped.filter(d => parseInt(d.decade) > 1920).map((decData, i) => (
                                <div key={i} className="bg-black/40 rounded-lg p-4 border border-gray-800">
                                    <div className="text-[#00f2fe] font-bold text-xl mb-3 border-b border-gray-800 pb-2">{decData.decade}</div>
                                    <div className="space-y-2">
                                        {decData.data.slice(0, 4).map((m, j) => {
                                            const maxC = decData.data[0].count;
                                            const intensity = 0.3 + (0.7 * (m.count / maxC));
                                            return (
                                                <div key={j} className="heat-cell flex justify-between items-center bg-[#8a2be2] rounded px-2 py-1" style={{opacity: intensity}}>
                                                    <span className="text-[10px] font-bold text-white uppercase truncate pr-2" title={m.category}>{m.category}</span>
                                                    <span className="text-xs font-mono text-white/80">{m.count}</span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>



                    {/* NETWORK UI MODAL */}
                    {showNetworkModal && (
                        <NetworkChart 
                            data={UAP_DATA.network} 
                            onClose={() => setShowNetworkModal(false)}
                            onNodeClick={(code) => {
                                setFilterMotifCodes(prev => 
                                    prev.includes(code) 
                                        ? prev.filter(c => c !== code)
                                        : [...prev, code]
                                );
                                setShowNetworkModal(false);
                            }}
                        />
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
